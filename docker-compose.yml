services:
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: events-dashboard
    command: uvicorn api.dashboard:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: events-worker
    command: python worker/consumer.py
    env_file: .env
    volumes:
      - ./backend:/app
      - ./backend/models:/app/models

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: events-timescaledb
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_password
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

volumes:
  timescaledb_data:
