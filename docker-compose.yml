services:
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kimura-dashboard
    command: uvicorn api.dashboard:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: kimura-worker
    command: python worker/consumer.py
    env_file: .env
    volumes:
      - ./backend:/app
      - ./backend/models:/app/models
