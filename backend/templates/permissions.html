<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events AI - Gerenciar Permissões</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#3b82f6',
                        success: '#10b981',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Modal background blur */
        .modal-bg {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen p-6 md:p-10 relative">
    <!-- Header -->
    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-indigo-400">
                Gerenciar Permissões de IMEI
            </h1>
            <p class="text-sm text-gray-400 mt-1">Configure o acesso a modelos de IA por equipamento</p>
        </div>
        <div class="flex items-center space-x-3 bg-card px-4 py-2 rounded-full border border-gray-700 shadow-lg">
            <a href="/" class="text-sm font-semibold text-gray-300 hover:text-white mr-4 border-r border-gray-600 pr-4">Voltar ao Dashboard</a>
            <button onclick="openModal()" class="text-sm font-semibold text-success hover:text-green-400">
                + Adicionar IMEI
            </button>
        </div>
    </header>

    <!-- Permissions Table -->
    <div class="glass rounded-2xl shadow-xl overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-700 bg-gray-800/50 flex justify-between items-center">
            <h2 class="text-xl font-semibold">Lista de Permissões</h2>
            <button onclick="loadPermissions()" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded transition">Atualizar</button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-800/30 text-gray-400 text-sm uppercase tracking-wider">
                        <th class="px-6 py-4 font-medium">IMEI</th>
                        <th class="px-6 py-4 font-medium">YOLO Ativo</th>
                        <th class="px-6 py-4 font-medium">VLM Ativo</th>
                        <th class="px-6 py-4 font-medium">Modelos Permitidos</th>
                        <th class="px-6 py-4 font-medium text-right">Ações</th>
                    </tr>
                </thead>
                <tbody id="permissions-tbody" class="divide-y divide-gray-700/50">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-bg">
        <div class="glass rounded-2xl shadow-2xl w-full max-w-lg p-6 border border-gray-600 transform transition-all">
            <h3 id="modal-title" class="text-2xl font-bold mb-4 text-white">Editar IMEI</h3>
            
            <form id="permission-form" onsubmit="savePermission(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-400 mb-1">IMEI</label>
                    <input type="text" id="imei-input" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-primary" placeholder="Ex: 14681536 ou GLOBAL_DEFAULT">
                </div>

                <div class="flex space-x-6 mb-6">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="use-yolo-input" class="w-5 h-5 text-primary bg-gray-800 border-gray-600 rounded focus:ring-primary">
                        <span class="text-sm font-medium text-gray-300">Usar YOLO</span>
                    </label>
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" id="use-vlm-input" class="w-5 h-5 text-primary bg-gray-800 border-gray-600 rounded focus:ring-primary">
                        <span class="text-sm font-medium text-gray-300">Usar VLM</span>
                    </label>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-400 mb-2">Modelos Permitidos</label>
                    <div id="models-container" class="grid grid-cols-2 gap-2">
                        <!-- Checkboxes will be generated here -->
                    </div>
                </div>

                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded-lg transition">Cancelar</button>
                    <button type="submit" class="px-4 py-2 bg-primary hover:bg-blue-600 text-white font-semibold rounded-lg shadow-lg transition">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const AVAILABLE_MODELS = [
            "Bocejo", "Distração", "Uso de Celular", "Fumar", 
            "EPI", "Capacete", "Acompanhante"
        ];

        let permissionsData = {};
        let currentEditingImei = null;

        // Initialize checkboxes
        const modelsContainer = document.getElementById('models-container');
        AVAILABLE_MODELS.forEach(model => {
            const label = document.createElement('label');
            label.className = 'flex items-center space-x-2 cursor-pointer';
            label.innerHTML = `
                <input type="checkbox" value="${model}" class="model-checkbox w-4 h-4 text-primary bg-gray-800 border-gray-600 rounded focus:ring-primary">
                <span class="text-sm text-gray-300">${model}</span>
            `;
            modelsContainer.appendChild(label);
        });

        async function loadPermissions() {
            try {
                const res = await fetch('/api/permissions');
                permissionsData = await res.json();
                renderTable();
            } catch (err) {
                console.error("Failed to load permissions", err);
                alert("Erro ao carregar permissões");
            }
        }

        function renderTable() {
            const tbody = document.getElementById('permissions-tbody');
            tbody.innerHTML = '';
            
            for (const [imei, config] of Object.entries(permissionsData)) {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-white/5 transition duration-150';
                
                const modelsLabels = config.allowed_models.map(m => 
                    `<span class="inline-block bg-gray-700 text-xs px-2 py-1 rounded mr-1 mb-1">${m}</span>`
                ).join('');

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold ${imei === 'GLOBAL_DEFAULT' ? 'text-primary' : 'text-white'}">${imei}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${config.use_yolo ? '<span class="text-success font-bold">✓ Sim</span>' : '<span class="text-gray-500">✗ Não</span>'}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        ${config.use_vlm ? '<span class="text-success font-bold">✓ Sim</span>' : '<span class="text-gray-500">✗ Não</span>'}
                    </td>
                    <td class="px-6 py-4 text-sm max-w-md flex-wrap">${modelsLabels || '<span class="text-gray-500">Nenhum</span>'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right">
                        <button onclick="editImei('${imei}')" class="text-primary hover:text-blue-400 mr-3 transition">Editar</button>
                        ${imei !== 'GLOBAL_DEFAULT' ? `<button onclick="deleteImei('${imei}')" class="text-danger hover:text-red-400 transition">Excluir</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        function openModal(imei = null) {
            currentEditingImei = imei;
            document.getElementById('edit-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = imei ? `Editar Permissões: ${imei}` : 'Novo IMEI';
            
            const imeiInput = document.getElementById('imei-input');
            const useYoloInput = document.getElementById('use-yolo-input');
            const useVlmInput = document.getElementById('use-vlm-input');
            const checkboxes = document.querySelectorAll('.model-checkbox');

            if (imei && permissionsData[imei]) {
                imeiInput.value = imei;
                imeiInput.disabled = (imei === 'GLOBAL_DEFAULT');
                useYoloInput.checked = permissionsData[imei].use_yolo;
                useVlmInput.checked = permissionsData[imei].use_vlm;
                
                checkboxes.forEach(cb => {
                    cb.checked = permissionsData[imei].allowed_models.includes(cb.value);
                });
            } else {
                imeiInput.value = '';
                imeiInput.disabled = false;
                useYoloInput.checked = true;
                useVlmInput.checked = false;
                checkboxes.forEach(cb => cb.checked = false);
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function savePermission(e) {
            e.preventDefault();
            
            const imei = document.getElementById('imei-input').value.trim();
            if (!imei) return alert("IMEI é obrigatório");

            const useYolo = document.getElementById('use-yolo-input').checked;
            const useVlm = document.getElementById('use-vlm-input').checked;
            
            const selectedModels = Array.from(document.querySelectorAll('.model-checkbox:checked')).map(cb => cb.value);

            // If editing and changed IMEI (not allowed for DEFAULT though), remove old
            if (currentEditingImei && currentEditingImei !== imei && currentEditingImei !== 'GLOBAL_DEFAULT') {
                delete permissionsData[currentEditingImei];
            }

            permissionsData[imei] = {
                use_yolo: useYolo,
                use_vlm: useVlm,
                allowed_models: selectedModels
            };

            await persistData();
            closeModal();
            renderTable();
        }

        async function deleteImei(imei) {
            if (imei === 'GLOBAL_DEFAULT') return alert("Não é possível excluir o padrão global.");
            if (!confirm(`Tem certeza que deseja excluir as permissões do IMEI ${imei}?`)) return;
            
            delete permissionsData[imei];
            await persistData();
            renderTable();
        }

        async function persistData() {
            try {
                const res = await fetch('/api/permissions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(permissionsData)
                });
                if (!res.ok) throw new Error("Server returned " + res.status);
            } catch (err) {
                console.error(err);
                alert("Erro ao salvar permissões no servidor");
            }
        }

        // Load initially
        loadPermissions();
    </script>
</body>
</html>
